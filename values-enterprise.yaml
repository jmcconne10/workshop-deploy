# =====================================================================
# Enterprise OpenShift & Nexus Configuration Override (values-enterprise.yaml)
# Use this file to override defaults when deploying to the internal system:
#   helm install workshop-poc charts/workshop -f values-enterprise.yaml
# =====================================================================

global:
  # Explicitly override the namespace if required, otherwise takes the release namespace
  namespaceOverride: ""

# ---------------------------------------------------------------------
# OpenShift Cluster Configuration
# ---------------------------------------------------------------------
openshift:
  # REQUIRED: set to your enterprise cluster's API server. If left as the chart
  # default (the Developer Sandbox's API server), the git server's post-receive hook
  # will call the wrong cluster and silently fail to trigger builds. Always pass
  # explicitly, e.g. --set openshift.apiServer=https://api.openshift.company.com:6443
  apiServer: ""

# ---------------------------------------------------------------------
# Git server Enterprise Customizations
# ---------------------------------------------------------------------
gitServer:
  enabled: true
  # Enterprise/air-gap: run a PRE-BUILT git server image from your registry instead of
  # building it in-cluster (the in-cluster build needs egress to Red Hat image/package
  # repos). Build it once from charts/workshop/files/gitserver/Containerfile and push it
  # to Nexus, then reference it here.
  build:
    enabled: false
  image:
    repository: nexus.company.com/repository/container-images/workshop/gitserver
    tag: latest
    pullPolicy: IfNotPresent
    # Pull secret(s) for the pre-built image (rendered into the pod's imagePullSecrets).
    # The named secret must already exist in the namespace (see ENTERPRISE_DEPLOY.md Step 1).
    pullSecrets:
      - name: nexus-registry-credentials

  service:
    type: ClusterIP
    port: 8080

  # Modest bump for enterprise multi-team usage (the git server is lightweight — no DB).
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  persistence:
    enabled: true
    size: 20Gi  # Scale up storage capacity for multi-team usage
    # Set to your internal cluster's Persistent Volume storage class
    # (e.g., gp3, thin, ocs-storagecluster-cephfs, portworx)
    storageClass: "gp3"

  # Shared push credential (cloning is anonymous; pushing requires this via htpasswd).
  admin:
    username: workshop-admin
    # Ensure a secure, custom password is set for production
    password: "SecureEnterprisePassword123!"

# ---------------------------------------------------------------------
# Starter Flask Application (Production Scale-Up)
# ---------------------------------------------------------------------
starterApp:
  image:
    pullPolicy: IfNotPresent
  dev:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  prod:
    # Scale production instance to multiple replicas for high-availability
    replicas: 3
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

# ---------------------------------------------------------------------
# BuildConfigs & S2I Configurations
# ---------------------------------------------------------------------
build:
  # Point to the S2I python image hosted in the internal Nexus registry
  builderImage: nexus.company.com/repository/container-images/ubi8/python-39:latest
  
  # Image pull secret for pulling the S2I builder image from a private Nexus. The first
  # entry is rendered into each BuildConfig's `strategy.sourceStrategy.pullSecret`. The
  # named secret must already exist in the namespace (see ENTERPRISE_DEPLOY.md Step 1).
  # Leave empty/unset if the registry needs no auth or you link the secret to the
  # `builder` service account instead.
  pullSecrets:
    - name: nexus-registry-credentials
    
  # Retain history of builds (can be increased slightly for active debugging)
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3
  
  # Name of starter repo
  repoName: starter-flask-app
  
  # Change this to a secure, unique token for triggering BuildConfigs
  webhookSecret: "enterprise-webhook-token-xyz-12345"
