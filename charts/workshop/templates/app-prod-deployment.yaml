apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workshop.fullname" . }}-prod
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
    environment: prod
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"{{ include "workshop.fullname" . }}-prod:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]'
spec:
  replicas: {{ .Values.starterApp.prod.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "workshop.name" . }}-prod
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ include "workshop.name" . }}-prod
    spec:
      containers:
        - name: app
          # Full internal registry path so the node resolves directly from the OpenShift registry
          image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/{{ include "workshop.fullname" . }}-prod:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: prod
          resources:
            {{- toYaml .Values.starterApp.prod.resources | nindent 12 }}
          # Simple liveness/readiness probes checking port 8080
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
