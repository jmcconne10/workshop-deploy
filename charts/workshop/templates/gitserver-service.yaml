apiVersion: v1
kind: Service
metadata:
  name: {{ include "workshop.fullname" . }}-gitserver
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gitServer.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.gitServer.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
  selector:
    app: {{ include "workshop.name" . }}-gitserver
