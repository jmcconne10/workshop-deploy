apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "workshop.fullname" . }}-gitserver
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "workshop.fullname" . }}-gitserver
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
