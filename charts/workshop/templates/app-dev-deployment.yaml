apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workshop.fullname" . }}-dev
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
    environment: dev
spec:
  replicas: {{ .Values.starterApp.dev.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "workshop.name" . }}-dev
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ include "workshop.name" . }}-dev
    spec:
      containers:
        - name: app
          # Full internal registry path so the node resolves directly from the OpenShift registry
          image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/{{ include "workshop.fullname" . }}-dev:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.starterApp.dev.resources | nindent 12 }}
          # Simple liveness/readiness probes checking port 8080
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
