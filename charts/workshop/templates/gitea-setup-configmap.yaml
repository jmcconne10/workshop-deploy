apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "workshop.fullname" . }}-gitea-setup
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  setup.sh: |
    #!/bin/sh
    set -e

    GITEA_URL="http://{{ include "workshop.fullname" . }}-gitea:3000"
    ADMIN_USER="{{ .Values.gitea.admin.username }}"
    ADMIN_PASS="{{ .Values.gitea.admin.password }}"
    REPO_NAME="{{ .Values.build.repoName }}"
    NAMESPACE="{{ .Release.Namespace }}"

    echo "Waiting for Gitea to be ready..."
    until curl -s -f "${GITEA_URL}/api/v1/swagger" > /dev/null; do
      echo "Gitea not ready. Retrying in 5 seconds..."
      sleep 5
    done
    echo "Gitea is up and running!"

    echo "Creating repository ${REPO_NAME}..."
    curl -s -f -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"name\": \"${REPO_NAME}\", \"auto_init\": true, \"private\": false}" \
      "${GITEA_URL}/api/v1/user/repos" || echo "Repository might already exist."

    echo "Querying default branch..."
    DEFAULT_BRANCH=$(curl -s -u "${ADMIN_USER}:${ADMIN_PASS}" "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}" | grep -o '"default_branch":"[^"]*' | cut -d'"' -f4)
    if [ -z "$DEFAULT_BRANCH" ]; then
      DEFAULT_BRANCH="main"
    fi
    echo "Default branch is ${DEFAULT_BRANCH}"

    # Generate base64 content for starter Flask app files
    cat << 'EOF' | sed 's/^[[:space:]]\{4\}//' > app.py
    from flask import Flask
    app = Flask(__name__)

    @app.route('/')
    def hello():
        return "Hello from OpenShift Hackathon!"

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
    EOF

    APP_PY_B64=$(cat app.py | base64 | tr -d '\n' | tr -d '\r')

    cat << 'EOF' | sed 's/^[[:space:]]\{4\}//' > requirements.txt
    Flask==3.0.3
    EOF

    REQ_TXT_B64=$(cat requirements.txt | base64 | tr -d '\n' | tr -d '\r')

    echo "Uploading app.py to ${DEFAULT_BRANCH}..."
    curl -s -f -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"branch\": \"${DEFAULT_BRANCH}\", \"content\": \"${APP_PY_B64}\", \"message\": \"feat: add app.py starter code\"}" \
      "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}/contents/app.py" || echo "app.py might already exist."

    echo "Uploading requirements.txt to ${DEFAULT_BRANCH}..."
    curl -s -f -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"branch\": \"${DEFAULT_BRANCH}\", \"content\": \"${REQ_TXT_B64}\", \"message\": \"feat: add requirements.txt dependencies\"}" \
      "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}/contents/requirements.txt" || echo "requirements.txt might already exist."

    # Create dev branch from default branch
    echo "Creating dev branch..."
    curl -s -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"new_branch_name\": \"dev\", \"old_branch_name\": \"${DEFAULT_BRANCH}\"}" \
      "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}/branches" || echo "Branch dev might already exist."

    # Webhook URLs pointing to the BuildConfig generic triggers
    DEV_WEBHOOK_URL="https://kubernetes.default.svc/apis/build.openshift.io/v1/namespaces/${NAMESPACE}/buildconfigs/{{ include "workshop.fullname" . }}-dev/webhooks/{{ .Values.build.webhookSecret | default "secretwebhooktoken123" }}/generic"
    PROD_WEBHOOK_URL="https://kubernetes.default.svc/apis/build.openshift.io/v1/namespaces/${NAMESPACE}/buildconfigs/{{ include "workshop.fullname" . }}-prod/webhooks/{{ .Values.build.webhookSecret | default "secretwebhooktoken123" }}/generic"

    echo "Registering dev webhook in Gitea..."
    curl -s -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"type\": \"gitea\", \"config\": {\"url\": \"${DEV_WEBHOOK_URL}\", \"content_type\": \"json\", \"skip_verify\": \"1\"}, \"events\": [\"push\"], \"branch_filter\": \"dev\", \"active\": true}" \
      "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}/hooks" || echo "Dev webhook registration failed or already registered."

    echo "Registering prod webhook in Gitea..."
    curl -s -u "${ADMIN_USER}:${ADMIN_PASS}" \
      -H "Content-Type: application/json" \
      -d "{\"type\": \"gitea\", \"config\": {\"url\": \"${PROD_WEBHOOK_URL}\", \"content_type\": \"json\", \"skip_verify\": \"1\"}, \"events\": [\"push\"], \"branch_filter\": \"${DEFAULT_BRANCH}\", \"active\": true}" \
      "${GITEA_URL}/api/v1/repos/${ADMIN_USER}/${REPO_NAME}/hooks" || echo "Prod webhook registration failed or already registered."

    echo "Gitea setup completed successfully!"
