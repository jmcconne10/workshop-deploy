{{- /*
htpasswd file for the git server's push (git-receive-pack) auth. Clone/fetch stays
anonymous (see start.sh) so the S2I BuildConfigs can keep cloning without credentials.
The hash uses bcrypt via sprig `htpasswd`, which re-salts on every render — harmless
here (the Secret is just recreated), but it means the rendered value is non-deterministic.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "workshop.fullname" . }}-gitserver-auth
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
type: Opaque
stringData:
  htpasswd: {{ htpasswd .Values.gitServer.admin.username .Values.gitServer.admin.password | quote }}
