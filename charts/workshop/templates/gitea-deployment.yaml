apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workshop.fullname" . }}-gitea
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "workshop.name" . }}-gitea
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ include "workshop.name" . }}-gitea
    spec:
      {{- with .Values.gitea.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gitea
          image: "{{ .Values.gitea.image.repository }}:{{ .Values.gitea.image.tag }}"
          imagePullPolicy: {{ .Values.gitea.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 2222
              protocol: TCP
          env:
            - name: GITEA_APP_INI
              value: "/var/lib/gitea/gitea.ini"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__database__DB_TYPE
              value: "sqlite3"
            - name: GITEA__database__PATH
              value: "/var/lib/gitea/gitea.db"
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__SSH_PORT
              value: "2222"
            - name: GITEA__server__START_SSH_SERVER
              value: "true"
            - name: GITEA__server__OFFLINE_MODE
              value: "true"
            - name: GITEA__webhook__ALLOWED_HOST_LIST
              value: "*"
            - name: GITEA__webhook__SKIP_TLS_VERIFY
              value: "true"
            # Admin credentials configured via Helm values
            - name: GITEA__admin__USER
              value: {{ .Values.gitea.admin.username | quote }}
            - name: GITEA__admin__PASSWORD
              value: {{ .Values.gitea.admin.password | quote }}
            - name: GITEA__admin__EMAIL
              value: {{ .Values.gitea.admin.email | quote }}
          resources:
            {{- toYaml .Values.gitea.resources | nindent 12 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      if gitea admin user create --admin --username {{ .Values.gitea.admin.username | quote }} --password {{ .Values.gitea.admin.password | quote }} --email {{ .Values.gitea.admin.email | quote }} --must-change-password=false; then
                        echo "Admin user created successfully."
                        break
                      fi
                      echo "Database not ready yet. Retrying in 2 seconds..."
                      sleep 2
                    done
          volumeMounts:
            - name: gitea-data
              mountPath: /var/lib/gitea
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: {{ include "workshop.fullname" . }}-gitea
