apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ include "workshop.fullname" . }}-dev
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
spec:
  lookupPolicy:
    local: true
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ include "workshop.fullname" . }}-prod
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
spec:
  lookupPolicy:
    local: true
