apiVersion: v1
kind: Secret
metadata:
  name: {{ include "workshop.fullname" . }}-oc-token
  labels:
    {{- include "workshop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  token: {{ .Values.openshift.token | default "" | quote }}
