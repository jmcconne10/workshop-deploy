# Global Configuration
global:
  # The OpenShift namespace is dynamically determined, but can be overridden here if needed.
  namespaceOverride: ""

# OpenShift Cluster Configuration
openshift:
  # REQUIRED: your cluster's external API server (e.g. https://api.rm3.7wse.p1.openshiftapps.com:6443).
  # Used by the git server's post-receive hook to call the BuildConfig trigger
  # endpoint. Left blank by default (rather than a real-looking
  # example) because every Developer Sandbox/cluster has a unique URL — leaving this
  # unset here and pointing at someone else's cluster by accident is worse than a
  # loud, obvious failure. Always pass explicitly, e.g.
  #   --set openshift.apiServer=$(oc whoami --show-server)
  apiServer: ""
  # OC login token — loaded from the Secret 'workshop-poc-oc-token'.
  # REQUIRED for the git server's post-receive hook to authenticate to the build
  # trigger; without it the hook gets HTTP 403 (an empty Bearer token is anonymous).
  # Do NOT set this here; set it via: --set openshift.token=$(oc whoami -t)
  token: ""

# Git server configuration
# A bare git server on Red Hat UBI (git + httpd serving smart HTTP via
# git-http-backend). The image is built in-cluster from
# charts/workshop/files/gitserver/Containerfile. Pushes fire a git post-receive
# hook that triggers the dev/prod BuildConfig webhooks (replaces Gitea's webhook).
gitServer:
  enabled: true
  # Image build strategy.
  #  build.enabled: true  (default) → the chart builds the git server image in-cluster
  #    from files/gitserver/Containerfile (needs egress to Red Hat image/package repos).
  #  build.enabled: false → skip the in-cluster build and run a PRE-BUILT image from
  #    `image` below (for air-gapped/enterprise clusters — build it once and push it to
  #    your registry).
  build:
    enabled: true
  image:
    # Only used when build.enabled is false. Point at your pre-built git server image.
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent
    # Pull secret(s) for the pre-built image, rendered into imagePullSecrets.
    pullSecrets: []
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    keepOnUninstall: false
  # Shared credential participants use to push. Cloning is anonymous; pushing
  # (git-receive-pack) requires this credential via an htpasswd basic-auth check.
  admin:
    username: workshop-admin
    password: "WorkshopAdminPassword123!"

# Starter Flask Application Configuration
starterApp:
  image:
    pullPolicy: IfNotPresent
  dev:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prod:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Team Configuration
# Number of developers on the team. When >= 2, the setup Job pre-creates branches
# member1..memberN off `dev`, one per developer, so each works on their own branch
# and merges into `dev` to update the shared Dev site. Default 1 (solo) creates no
# member branches — the single developer just uses `dev` directly. The batch
# orchestrator sets this per team from the roster's `members` field.
memberCount: 1

# Build and S2I Configuration
build:
  # The Python builder image used by OpenShift S2I build.
  # Using ubi8/python-39 as a lightweight builder.
  builderImage: registry.redhat.io/ubi8/python-39:latest
  # History limits for S2I builds to conserve space/quota.
  successfulBuildsHistoryLimit: 2
  failedBuildsHistoryLimit: 2
  # Repo name served by the git server
  repoName: starter-flask-app
  # Webhook secret used in the BuildConfig generic webhook URL path
  webhookSecret: "secretwebhooktoken123"
