# Global Configuration
global:
  # The OpenShift namespace is dynamically determined, but can be overridden here if needed.
  namespaceOverride: ""

# OpenShift Cluster Configuration
openshift:
  # External API server URL (e.g. https://api.rm3.7wse.p1.openshiftapps.com:6443)
  # Used by the Gitea webhook to call the BuildConfig trigger endpoint.
  apiServer: "https://api.rm3.7wse.p1.openshiftapps.com:6443"
  # OC login token — loaded from the Secret 'workshop-poc-oc-token'.
  # Do NOT set this here; set it via: --set openshift.token=<token> or a Secret.
  token: ""

# Gitea configuration
gitea:
  enabled: true
  image:
    repository: gitea/gitea
    tag: 1.22.0-rootless
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    sshPort: 2222
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    keepOnUninstall: false
  admin:
    username: workshop-admin
    # Sane default password for the admin account
    password: "WorkshopAdminPassword123!"
    email: admin@example.com

# Starter Flask Application Configuration
starterApp:
  image:
    pullPolicy: IfNotPresent
  dev:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prod:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Build and S2I Configuration
build:
  # The Python builder image used by OpenShift S2I build.
  # Using ubi8/python-39 as a lightweight builder.
  builderImage: registry.redhat.io/ubi8/python-39:latest
  # History limits for S2I builds to conserve space/quota.
  successfulBuildsHistoryLimit: 2
  failedBuildsHistoryLimit: 2
  # Repo name inside Gitea
  repoName: starter-flask-app
  # Webhook secret used in the BuildConfig generic webhook URL path
  webhookSecret: "secretwebhooktoken123"
